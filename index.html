<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>手机俄罗斯方块</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>俄罗斯方块</h1>
        <button id="pauseBtn" class="btn btn-small">暂停</button>
      </header>

      <section class="board-wrap">
        <div class="canvas-wrap">
          <canvas id="game" width="300" height="600" aria-label="俄罗斯方块游戏区域"></canvas>
          <div id="fxText" class="fx-text" aria-live="polite"></div>
        </div>

        <aside class="panel">
          <p>分数：<span id="score">0</span></p>
          <p>等级：<span id="level">1</span></p>
          <p>行数：<span id="lines">0</span></p>
          <p>连击：<span id="combo">0</span></p>
          <button id="restartBtn" class="btn">重新开始</button>
        </aside>
      </section>

      <section class="controls" aria-label="触屏控制按钮">
        <div class="dpad">
          <button class="btn control" data-action="rotate">⟳</button>
          <button class="btn control" data-action="left">◀</button>
          <button class="btn control" data-action="down">▼</button>
          <button class="btn control" data-action="right">▶</button>
        </div>
        <button class="btn hard-drop" data-action="drop">一键到底</button>
      </section>

      <p class="hint">键盘也可操作：← → ↓、空格、↑</p>
    </main>

    <script src="tetris.js"></script>
  </body>
</html>
